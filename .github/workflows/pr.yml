name: PR Pipeline

on:
  pull_request:
    branches: [main, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and code style
        run: pnpm exec prettier --check "src/**/*.ts"

      - name: Build
        run: pnpm run build

      - name: Unit tests with coverage
        run: echo "TODO — unit test runner not yet configured"
        # run: pnpm run test:unit -- --coverage

      # - name: Coverage gate (minimum 80%)
      #   run: pnpm run test:coverage-check

      - name: Integration tests
        run: echo "TODO — integration test runner not yet configured"
        # run: pnpm run test:integration
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/ats_test

      # - name: SAST scan (CodeQL)
      #   uses: github/codeql-action/analyze@v3

      - name: Dependency vulnerability scan
        run: pnpm audit --audit-level=high || true
