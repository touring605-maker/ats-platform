openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LastATS - Applicant Tracking System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Organization and tenant management
  - name: jobs
    description: Job posting management
  - name: candidates
    description: Candidate profile management
  - name: applications
    description: Application tracking and management
  - name: email-templates
    description: Email template management
  - name: careers
    description: Public careers page and application submission

security:
  - clerkAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /organizations/mine:
    get:
      operationId: getMyOrganizations
      tags: [organizations]
      summary: Get current user's organizations
      responses:
        "200":
          description: List of organizations the user belongs to
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - $ref: "#/components/parameters/OrgIdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{id}/members:
    get:
      operationId: getOrganizationMembers
      tags: [organizations]
      summary: List organization members
      parameters:
        - $ref: "#/components/parameters/OrgIdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: List of organization members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      operationId: addOrganizationMember
      tags: [organizations]
      summary: Add or update an organization member
      parameters:
        - $ref: "#/components/parameters/OrgIdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrganizationMember"
      responses:
        "201":
          description: Member added or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [jobs]
      summary: Dashboard summary with counts and recent activity
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /jobs/stats:
    get:
      operationId: getJobStats
      tags: [jobs]
      summary: Job counts grouped by status
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Job status counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs for the organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: search
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of jobs with application counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedJobsWithCounts"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job posting
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJob"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job posting
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJob"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job posting
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "204":
          description: Job deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/form-fields:
    get:
      operationId: listJobFormFields
      tags: [jobs]
      summary: List custom form fields for a job
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: List of custom form fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomField"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: replaceJobFormFields
      tags: [jobs]
      summary: Replace all custom form fields for a job (supports reordering)
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomField"
      responses:
        "200":
          description: Updated list of custom form fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomField"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: addJobFormField
      tags: [jobs]
      summary: Add a custom form field to a job
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomField"
      responses:
        "201":
          description: Form field added
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomField"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/form-fields/{fieldId}:
    delete:
      operationId: deleteJobFormField
      tags: [jobs]
      summary: Remove a custom form field from a job
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form field removed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomField"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: search
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCandidates"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create a candidate
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidate"
      responses:
        "201":
          description: Candidate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get candidate details
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Candidate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update a candidate
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidate"
      responses:
        "200":
          description: Candidate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteCandidate
      tags: [candidates]
      summary: Delete a candidate
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "204":
          description: Candidate deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications with filtering, sorting, and rating aggregation
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: jobId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApplicationStatus"
        - name: search
          in: query
          description: Search by candidate name or email
          schema:
            type: string
        - name: minRating
          in: query
          description: Minimum average rating filter
          schema:
            type: string
        - name: dateFrom
          in: query
          description: Filter applications from this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: Filter applications up to this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: sortBy
          in: query
          description: Sort field
          schema:
            type: string
            enum: [appliedAt, candidateName, rating, status]
            default: appliedAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedApplications"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a new application
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplication"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application details with ratings
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "204":
          description: Application deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /applications/{id}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/ApplicationStatus"
              required:
                - status
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /applications/{id}/resume:
    get:
      operationId: getApplicationResume
      tags: [applications]
      summary: Stream the candidate resume file (auth via Bearer token only)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Resume file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /applications/{id}/notes:
    patch:
      operationId: updateApplicationNotes
      tags: [applications]
      summary: Update application internal notes
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
              required:
                - notes
      responses:
        "200":
          description: Notes updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /applications/{id}/email:
    post:
      operationId: sendApplicationEmail
      tags: [applications]
      summary: Send an email to the candidate for this application
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateId:
                  type: string
                  format: uuid
                subject:
                  type: string
                htmlBody:
                  type: string
                textBody:
                  type: string
              required:
                - subject
                - htmlBody
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  emailLogId:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /applications/{id}/emails:
    get:
      operationId: getApplicationEmails
      tags: [applications]
      summary: Get email history for an application
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Email history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /applications/bulk-email:
    post:
      operationId: sendBulkEmail
      tags: [applications]
      summary: Send bulk email to selected candidates
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                templateId:
                  type: string
                  format: uuid
                subject:
                  type: string
                htmlBody:
                  type: string
                textBody:
                  type: string
              required:
                - applicationIds
                - subject
                - htmlBody
      responses:
        "200":
          description: Bulk email results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  total:
                    type: integer
                  sent:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        applicationId:
                          type: string
                        emailLogId:
                          type: string
                        status:
                          type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [email-templates]
      summary: List email templates for the organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createEmailTemplate
      tags: [email-templates]
      summary: Create a new email template
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                htmlBody:
                  type: string
                textBody:
                  type: string
                mergeFields:
                  type: array
                  items:
                    type: string
              required:
                - name
                - subject
                - htmlBody
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /email-templates/seed-defaults:
    get:
      operationId: seedDefaultEmailTemplates
      tags: [email-templates]
      summary: Seed default email templates for the organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /email-templates/{id}:
    get:
      operationId: getEmailTemplate
      tags: [email-templates]
      summary: Get an email template by ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Email template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateEmailTemplate
      tags: [email-templates]
      summary: Update an email template
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subject:
                  type: string
                htmlBody:
                  type: string
                textBody:
                  type: string
                mergeFields:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteEmailTemplate
      tags: [email-templates]
      summary: Delete an email template
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Template deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /careers/{orgSlug}:
    get:
      operationId: getCareersPage
      tags: [careers]
      summary: Public careers page - lists published jobs for an organization
      security: []
      parameters:
        - name: orgSlug
          in: path
          required: true
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: employmentType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Careers page data with organization info and published jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareersPageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /careers/{orgSlug}/jobs/{jobId}:
    get:
      operationId: getPublicJobDetail
      tags: [careers]
      summary: Public job detail page
      security: []
      parameters:
        - name: orgSlug
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job detail with organization info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /careers/{orgSlug}/jobs/{jobId}/apply:
    post:
      operationId: submitApplication
      tags: [careers]
      summary: Submit a job application (public, no auth required)
      security: []
      parameters:
        - name: orgSlug
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SubmitApplicationForm"
      responses:
        "201":
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmitResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /applications/{id}/ratings:
    get:
      operationId: getApplicationRatings
      tags: [applications]
      summary: Get ratings for an application
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationRating"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: rateApplication
      tags: [applications]
      summary: Rate an application (1-5 stars)
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRating"
      responses:
        "201":
          description: Rating created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRating"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk session token

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrgIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationIdHeader:
      name: X-Organization-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: The organization context for this request
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required:
        - page
        - limit
        - total
        - totalPages

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - isActive

    OrganizationMembership:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, hiring_manager, viewer]
        orgName:
          type: string
        orgSlug:
          type: string
        orgLogoUrl:
          type: string
          nullable: true
      required:
        - organizationId
        - role
        - orgName
        - orgSlug

    JobStatus:
      type: string
      enum: [draft, published, closed, archived]

    EmploymentType:
      type: string
      enum: [full_time, part_time, contract, internship, temporary]

    CustomField:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, select, checkbox, number, date, file]
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
        order:
          type: integer
      required:
        - id
        - label
        - type
        - required

    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        title:
          type: string
        department:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        salaryCurrency:
          type: string
        description:
          type: string
          nullable: true
        requirements:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/JobStatus"
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        isRemote:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        closedAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - title
        - employmentType
        - status
        - isRemote
        - createdBy

    CreateJob:
      type: object
      properties:
        title:
          type: string
        department:
          type: string
        location:
          type: string
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        salaryMin:
          type: integer
        salaryMax:
          type: integer
        salaryCurrency:
          type: string
        description:
          type: string
        requirements:
          type: string
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        isRemote:
          type: boolean
      required:
        - title

    UpdateJob:
      type: object
      properties:
        title:
          type: string
        department:
          type: string
        location:
          type: string
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        salaryMin:
          type: integer
        salaryMax:
          type: integer
        salaryCurrency:
          type: string
        description:
          type: string
        requirements:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        isRemote:
          type: boolean

    JobWithCount:
      allOf:
        - $ref: "#/components/schemas/Job"
        - type: object
          properties:
            applicationCount:
              type: integer

    PaginatedJobsWithCounts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/JobWithCount"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    PaginatedJobs:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    JobStats:
      type: object
      properties:
        draft:
          type: integer
        published:
          type: integer
        closed:
          type: integer
        archived:
          type: integer
        total:
          type: integer
      required:
        - draft
        - published
        - closed
        - archived
        - total

    DashboardSummary:
      type: object
      properties:
        totalJobs:
          type: integer
        activeJobs:
          type: integer
        totalCandidates:
          type: integer
        totalApplications:
          type: integer
        applicationsByStatus:
          type: object
          properties:
            new:
              type: integer
            reviewed:
              type: integer
            shortlisted:
              type: integer
            rejected:
              type: integer
            hired:
              type: integer
        recentJobs:
          type: array
          items:
            $ref: "#/components/schemas/JobWithCount"
      required:
        - totalJobs
        - activeJobs
        - totalCandidates
        - totalApplications
        - applicationsByStatus
        - recentJobs

    Candidate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        resumeUrl:
          type: string
          nullable: true
        linkedinUrl:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - firstName
        - lastName
        - email

    CreateCandidate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        resumeUrl:
          type: string
        linkedinUrl:
          type: string
        source:
          type: string
      required:
        - firstName
        - lastName
        - email

    PaginatedCandidates:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    ApplicationStatus:
      type: string
      enum: [new, reviewed, shortlisted, rejected, hired]

    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        candidateId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        customFieldResponses:
          type: object
          additionalProperties:
            type: string
        coverLetter:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        appliedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - jobId
        - candidateId
        - status

    ApplicationDetail:
      allOf:
        - $ref: "#/components/schemas/Application"
        - type: object
          properties:
            candidateFirstName:
              type: string
            candidateLastName:
              type: string
            candidateEmail:
              type: string
            candidatePhone:
              type: string
              nullable: true
            candidateResumeUrl:
              type: string
              nullable: true
            candidateLinkedinUrl:
              type: string
              nullable: true
            candidateSource:
              type: string
              nullable: true
            jobTitle:
              type: string
            jobDepartment:
              type: string
              nullable: true
            jobCustomFields:
              type: array
              nullable: true
              items:
                type: object
                properties:
                  id:
                    type: string
                  label:
                    type: string
                  type:
                    type: string
            ratings:
              type: array
              items:
                $ref: "#/components/schemas/ApplicationRating"

    PaginatedApplications:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            allOf:
              - $ref: "#/components/schemas/Application"
              - type: object
                properties:
                  candidateFirstName:
                    type: string
                  candidateLastName:
                    type: string
                  candidateEmail:
                    type: string
                  candidatePhone:
                    type: string
                    nullable: true
                  candidateResumeUrl:
                    type: string
                    nullable: true
                  jobTitle:
                    type: string
                  jobDepartment:
                    type: string
                    nullable: true
                  avgRating:
                    type: string
                    nullable: true
                    description: Average rating as decimal string
                  ratingCount:
                    type: integer
                    nullable: true
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination

    ApplicationRating:
      type: object
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
        ratedBy:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - applicationId
        - ratedBy
        - rating

    CreateApplication:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        candidateId:
          type: string
          format: uuid
        coverLetter:
          type: string
        customFieldResponses:
          type: object
          additionalProperties:
            type: string
      required:
        - jobId
        - candidateId

    OrganizationMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        clerkUserId:
          type: string
        role:
          type: string
          enum: [admin, hiring_manager, viewer]
        displayName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - clerkUserId
        - role

    AddOrganizationMember:
      type: object
      properties:
        clerkUserId:
          type: string
        role:
          type: string
          enum: [admin, hiring_manager, viewer]
        displayName:
          type: string
        email:
          type: string
      required:
        - clerkUserId

    CreateRating:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - rating

    PublicOrganization:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
      required:
        - name
        - slug

    PublicJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        department:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        employmentType:
          type: string
          nullable: true
        isRemote:
          type: boolean
          nullable: true
        salaryMin:
          type: number
          nullable: true
        salaryMax:
          type: number
          nullable: true
        salaryCurrency:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title

    PublicJobDetail:
      allOf:
        - $ref: "#/components/schemas/PublicJob"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            requirements:
              type: string
              nullable: true
            customFields:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/CustomField"

    CareersFilters:
      type: object
      properties:
        departments:
          type: array
          items:
            type: string
        locations:
          type: array
          items:
            type: string

    CareersPageResponse:
      type: object
      properties:
        organization:
          $ref: "#/components/schemas/PublicOrganization"
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/PublicJob"
        filters:
          $ref: "#/components/schemas/CareersFilters"
      required:
        - organization
        - jobs
        - filters

    JobDetailResponse:
      type: object
      properties:
        organization:
          $ref: "#/components/schemas/PublicOrganization"
        job:
          $ref: "#/components/schemas/PublicJobDetail"
      required:
        - organization
        - job

    SubmitApplicationForm:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        linkedinUrl:
          type: string
        coverLetter:
          type: string
        resume:
          type: string
          format: binary
        customFieldResponses:
          type: string
          description: JSON string of custom field responses
      required:
        - firstName
        - lastName
        - email

    ApplicationSubmitResponse:
      type: object
      properties:
        message:
          type: string
        applicationId:
          type: string
          format: uuid
      required:
        - message
        - applicationId

    EmailTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        subject:
          type: string
        htmlBody:
          type: string
        textBody:
          type: string
          nullable: true
        mergeFields:
          type: array
          items:
            type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - name
        - slug
        - subject
        - htmlBody
        - isDefault

    EmailLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
          nullable: true
        candidateId:
          type: string
          format: uuid
          nullable: true
        templateId:
          type: string
          format: uuid
          nullable: true
        toEmail:
          type: string
        subject:
          type: string
        htmlBody:
          type: string
        textBody:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, sent, failed]
        sentBy:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        sentAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - toEmail
        - subject
        - htmlBody
        - status
        - sentAt
